apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reviews
  template:
    metadata:
      labels:
        app: reviews
    spec:
      containers:
      - name: reviews
        image: reviews-service:1.0
        ports:
        - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: reviews-service
spec:
  type: NodePort
  selector:
    app: reviews
  ports:
    - port: 4002
      targetPort: 4002
      nodePort: 30002